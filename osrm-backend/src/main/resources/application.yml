server:
  port: 8888

spring:
  application:
    name: osrm-backend

  datasource:
    url: jdbc:mysql://114.66.38.81:3306/osrm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none  # 临时禁用，由Flyway管理
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        connection:
          charSet: UTF-8

  # Flyway 数据库版本管理
  flyway:
    enabled: true  # 启用Flyway
    # 基线脚本(V1)和增量脚本目录
    # 注意：需要在 osrm-backend 目录启动，或修改为此相对路径
    locations: filesystem:../osrm-deploy/sql/flyway/baseline,filesystem:../osrm-deploy/sql/flyway/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
    clean-disabled: true  # 生产环境禁止clean

  data:
    redis:
      host: 114.66.38.81
      port: 6379
      password:
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

jwt:
  secret: osrm-secret-key-for-jwt-signing-at-least-256-bits-long-change-in-production
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

osrm:
  encryption:
    key: dev-only-encryption-key-123456

logging:
  level:
    com.osrm: DEBUG
    org.springframework.security: DEBUG
