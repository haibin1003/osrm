# Test configuration
server:
  port: 0  # Random port

spring:
  application:
    name: osrm-backend-test

  # Use H2 in-memory database for tests with UTF-8 encoding
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  sql:
    init:
      mode: never  # Disabled - using DataInitializer instead
      schema-locations:
      data-locations:

  h2:
    console:
      enabled: true

  # Disable Redis for tests
  redis:
    host: localhost
    port: 6379
    password:
    database: 1

jwt:
  secret: test-secret-key-for-jwt-signing-at-least-256-bits-long-for-unit-tests-only
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

osrm:
  encryption:
    key: test-encryption-key-12345678

logging:
  level:
    com.osrm: DEBUG
    org.springframework.security: DEBUG
