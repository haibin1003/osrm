# 开发环境配置
server:
  port: 8080

spring:
  application:
    name: osrm-backend-dev

  # MySQL数据库（生产环境）
  datasource:
    url: jdbc:mysql://114.66.38.81:3306/osrm?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis配置
  data:
    redis:
      host: 114.66.38.81
      port: 6379
      password:
      database: 0
      timeout: 2000ms

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

jwt:
  secret: dev-secret-key-for-jwt-signing-at-least-256-bits-long-change-in-production
  access-token-expiration: 7200000
  refresh-token-expiration: 604800000

logging:
  level:
    com.osrm: DEBUG
    org.springframework.security: DEBUG
